<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .fg  { fill: #FFC108; }
    .ray { stroke: #FFC108; stroke-width: 2.5; stroke-linecap: round; fill: none; }
  </style>
  <!-- Sun body -->
  <circle class="fg" cx="16" cy="16" r="6"/>
  <!-- Cardinal rays -->
  <line class="ray" x1="24"   y1="16"   x2="28"   y2="16"  />
  <line class="ray" x1="8"    y1="16"   x2="4"    y2="16"  />
  <line class="ray" x1="16"   y1="24"   x2="16"   y2="28"  />
  <line class="ray" x1="16"   y1="8"    x2="16"   y2="4"   />
  <!-- Diagonal rays -->
  <line class="ray" x1="21.7" y1="21.7" x2="24.5" y2="24.5"/>
  <line class="ray" x1="10.3" y1="21.7" x2="7.5"  y2="24.5"/>
  <line class="ray" x1="10.3" y1="10.3" x2="7.5"  y2="7.5" />
  <line class="ray" x1="21.7" y1="10.3" x2="24.5" y2="7.5" />
</svg>
